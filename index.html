<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="projeto.css">
</head>

<body>

  <header>
    <h1>📋 Gerenciador de Tarefas</h1>
  </header>

  <main class="layout">

    <section class="painel">
      <h2>Nova Tarefa</h2>

      <input type="text" id="tarefa" placeholder="Digite uma tarefa">

      <label for="horarioTarefa">Horário da tarefa</label>
      <input type="time" id="horarioTarefa">

      <select id="prioridade">
        <option value="1">🔴 Importante</option>
        <option value="2">🟡 Média</option>
        <option value="3">🟢 Baixa</option>
      </select>

      <label>Categoria</label>
      <select id="categoria">
        <option value="📚 Escola">📚 Escola</option>
        <option value="💼 Trabalho">💼 Trabalho</option>
        <option value="🏠 Casa">🏠 Casa</option>
        <option value="✒️ Outros">✒️ Outros</option>
      </select>

      <div style="display: flex; align-items: center; gap: 8px; margin: 8px 0;">
        <input type="checkbox" id="favorita" style="width: 18px; height: 18px; margin: 0; cursor: pointer;">
        <label for="favorita" style="margin: 0; cursor: pointer; font-size: 14px;">⭐ Favoritar tarefa</label>
      </div>

      <button id="btnAdicionar">Adicionar</button>

      <div class="filtros">
        <button onclick="filtrarTarefas('todas')">Todas</button>
        <button onclick="filtrarTarefas('1')">Importante</button>
        <button onclick="filtrarTarefas('2')">Média</button>
        <button onclick="filtrarTarefas('3')">Baixa</button>
      </div>

      <button class="btn-apagar-tudo" onclick="apagarTudo()">🗑 Apagar Todas as Tarefas</button>

      <div id="contador" style="margin-top:10px; font-weight:bold;"></div>

    </section>

    <section class="tarefas">
      <h2>Lista de Tarefas</h2>
      <div id="lista"></div>
    </section>

  </main>

  <!-- MODAL DE CONFIRMAÇÃO -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>⚠️ Atenção!</h3>
      <p>Tem certeza que deseja apagar <strong>todas as tarefas</strong>? Essa ação não pode ser desfeita.</p>
      <div class="modal-botoes">
        <button class="btn-confirmar" onclick="confirmarApagarTudo()">✔ Sim, apagar tudo</button>
        <button class="btn-cancelar" onclick="fecharModal()">✖ Cancelar</button>
      </div>
    </div>
  </div>

  <footer>
    <div id="relogio"></div>
  </footer>

  <script src="projeto.js"></script>

</body>
</html>
